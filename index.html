<!doctype html>
<!-- Declara que es un documento HTML5 -->

<html lang="en">
  <head>
    <!-- Codificación de caracteres: permite tildes y símbolos especiales -->
    <meta charset="UTF-8" />

    <!-- Icono que aparece en la pestaña del navegador -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Hace que la página se vea bien en móviles (no hace zoom automático) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título que aparece en la pestaña del navegador -->
    <title>vite-1</title>
  </head>
  <body>

    <!-- Contenedor vacío donde React inyecta toda la aplicación -->
    <!-- El main.jsx busca este div con document.getElementById('root') -->
    <div id="root"></div>

    <!-- Carga el punto de entrada de React como módulo ES6 -->
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
